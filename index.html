<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#050606">
<title>English Lesson Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: dark;
  --page:#050606; --nav:#080909; --surface:#121212; --surface2:#171717;
  --ink:#F2F2F2; --ink2:#A6A6A6; --muted:#777777;
  --grid:#242424; --axis:#3a3a3a; --border:#242424; --border-sub:#1A1A1A;
  --accent:#00F5F5; --accent-hov:#00DCDC; --accent-sub:#062222;
  --good:#64FF6A; --bad:#FF174D; --warn:#FFF59C;
  --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300; --c5:#9085e9; --c6:#e66767; --c7:#d55181; --c8:#d95926;
  --font-display:"Space Grotesk","DM Sans","Hiragino Sans",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans","Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
  background:var(--page);color:var(--ink);font-size:15px;
  -webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;transition:all .15s ease-out}
a{color:var(--accent)}
.wrap{max-width:760px;margin:0 auto;padding:16px 16px 100px}
/* --- header --- */
header.app{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0 18px}
header.app .brand{display:flex;align-items:center;gap:11px}
header.app .mark{width:34px;height:34px;border-radius:9px;background:var(--accent-sub);border:1px solid #0a3535;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--accent);font-size:15px}
header.app h1{font-family:var(--font-display);font-size:17px;font-weight:700;letter-spacing:.04em;line-height:1.1}
header.app h1 span{color:var(--accent)}
header.app .sub2{font-size:9.5px;color:var(--muted);letter-spacing:.22em;margin-top:3px;font-weight:500}
header.app .sub{font-size:11px;color:var(--muted);white-space:nowrap;font-variant-numeric:tabular-nums;
  border:1px solid var(--border);border-radius:999px;padding:4px 10px;background:var(--nav)}
/* --- status banner --- */
.status-banner{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;
  background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);margin-bottom:14px;font-size:13px}
.status-banner.run{border-left-color:var(--warn)}
.status-banner.err{border-left-color:var(--bad)}
.status-banner .st-ico{font-size:18px}
.status-banner .st-msg{font-weight:600}
.status-banner .st-sub{font-size:11px;color:var(--muted);margin-top:2px}
/* --- cards --- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card h2{font-size:11.5px;font-weight:600;color:var(--muted);letter-spacing:.1em;margin-bottom:12px}
.prep-exp{padding:10px 0;border-bottom:1px solid var(--border-sub)}
.prep-exp:last-child{border-bottom:none}
.prep-exp .en{font-size:15px;font-weight:700;font-family:var(--font-display)}
.prep-exp .ja{font-size:12.5px;color:var(--ink2);margin-top:2px}
.prep-exp button{float:right;font-size:18px;padding:2px 8px}
.bigbtn{display:block;width:100%;text-align:center;padding:13px;border-radius:10px;
  background:var(--accent);color:#050606;font-weight:700;font-size:14px;margin-top:12px;letter-spacing:.02em}
.bigbtn:active{background:var(--accent-hov)}
.ghostbtn{display:inline-block;padding:9px 16px;border-radius:10px;border:1px solid var(--grid);
  color:var(--accent);font-size:13px;font-weight:600;background:var(--surface2)}
.ghostbtn:active{border-color:var(--accent)}
/* --- lock screen --- */
#lock{max-width:340px;margin:22vh auto 0;text-align:center;padding:24px}
#lock .mark{width:52px;height:52px;margin:0 auto 16px;border-radius:14px;background:var(--accent-sub);border:1px solid #0a3535;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--accent);font-size:22px}
#lock h1{font-family:var(--font-display);font-size:18px;letter-spacing:.05em;margin-bottom:4px}
#lock p{font-size:12px;color:var(--muted);margin-bottom:20px;letter-spacing:.05em}
#lock input{width:100%;padding:13px;border:1px solid var(--grid);border-radius:10px;font-size:16px;
  background:var(--surface);color:var(--ink);text-align:center;outline:none}
#lock input:focus{border-color:var(--accent)}
#lock button{width:100%;margin-top:10px;padding:13px;border-radius:10px;background:var(--accent);color:#050606;font-weight:700}
#lockErr{color:var(--bad);font-size:13px;margin-top:12px;min-height:1em}
/* --- tabs --- */
nav.tabs{position:fixed;bottom:0;left:0;right:0;display:flex;background:rgba(8,9,9,.92);backdrop-filter:blur(12px);
  border-top:1px solid var(--border-sub);padding-bottom:env(safe-area-inset-bottom);z-index:20}
nav.tabs button{flex:1;padding:9px 0 7px;font-size:10px;color:var(--muted);display:flex;flex-direction:column;gap:3px;align-items:center;letter-spacing:.04em}
nav.tabs button .ico{font-size:19px;line-height:1;filter:grayscale(1) opacity(.55)}
nav.tabs button.on{color:var(--accent);font-weight:700}
nav.tabs button.on .ico{filter:none}
/* --- stat tiles --- */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px}
.tile .lbl{font-size:10px;color:var(--muted);margin-bottom:6px;letter-spacing:.12em;font-weight:500}
.tile .val{font-family:var(--font-display);font-size:28px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.tile .val small{font-size:12px;font-weight:500;color:var(--muted);font-family:"DM Sans","Hiragino Sans",sans-serif}
.tile .delta{font-size:11px;margin-top:6px;color:var(--ink2);font-variant-numeric:tabular-nums}
.tile .delta.up{color:var(--good)}
.tile .delta.down{color:var(--bad)}
/* --- lists / badges --- */
.repeat li{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-sub);list-style:none;font-size:14px}
.repeat li:last-child{border-bottom:none}
.badge{min-width:36px;text-align:center;font-size:11px;font-weight:700;border-radius:6px;padding:3px 8px;
  background:var(--bad);color:#fff;font-variant-numeric:tabular-nums}
.badge.low{background:var(--surface2);border:1px solid var(--grid);color:var(--ink2)}
.repeat .cat{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}
.tag{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;border-radius:5px;padding:3px 8px;margin-right:8px;vertical-align:1px}
.tag.hot{background:#2b0a12;color:var(--bad);border:1px solid #4d1120}
.tag.cyan{background:var(--accent-sub);color:var(--accent);border:1px solid #0a3535}
.tag.dim{background:var(--surface2);color:var(--muted);border:1px solid var(--grid)}
/* --- legend / charts --- */
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px}
.legend span{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2)}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
.chart{width:100%;overflow-x:auto}
.chart svg{display:block}
.chart text{font-family:"DM Sans",sans-serif}
#tooltip{position:fixed;z-index:50;pointer-events:none;background:var(--surface2);border:1px solid var(--grid);
  border-radius:8px;padding:8px 10px;font-size:12px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;max-width:240px}
#tooltip .tt-title{font-weight:600;margin-bottom:4px}
#tooltip .tt-row{display:flex;align-items:center;gap:6px;color:var(--ink2)}
#tooltip .tt-row i{width:8px;height:8px;border-radius:2px;display:inline-block}
#tooltip .tt-row b{margin-left:auto;color:var(--ink);font-variant-numeric:tabular-nums}
/* --- reports --- */
.datebar{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:8px}
.datebar button{white-space:nowrap;padding:6px 13px;border-radius:999px;border:1px solid var(--grid);font-size:12.5px;
  color:var(--ink2);font-variant-numeric:tabular-nums;background:var(--surface)}
.datebar button.on{background:var(--accent);border-color:var(--accent);color:#050606;font-weight:700}
.md{font-size:14px;line-height:1.8}
.md h1{font-family:var(--font-display);font-size:17px;margin:14px 0 8px;letter-spacing:.02em}
.md h2{font-size:14px;margin:18px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--grid);color:var(--accent);font-weight:700}
.md h3{font-size:14px;margin:12px 0 4px}
.md p{margin:6px 0}
.md ul{margin:6px 0 6px 22px}
.md code{background:var(--surface2);border:1px solid var(--grid);border-radius:4px;padding:1px 5px;font-size:12.5px}
.md .tblwrap{overflow-x:auto;margin:8px 0;border:1px solid var(--grid);border-radius:8px}
.md table{border-collapse:collapse;font-size:13px;min-width:100%}
.md th,.md td{border-bottom:1px solid var(--border-sub);border-right:1px solid var(--border-sub);padding:7px 10px;text-align:left;vertical-align:top}
.md th{background:var(--surface2);color:var(--ink2);font-weight:600;white-space:nowrap}
.md tr:last-child td{border-bottom:none}
.md th:last-child,.md td:last-child{border-right:none}
/* --- pdf tab --- */
.xlist li{list-style:none;padding:11px 0;border-bottom:1px solid var(--border-sub);font-size:14px;line-height:1.6}
.xlist li:last-child{border-bottom:none}
.xlist .note{display:block;font-size:12px;color:var(--muted);margin-top:3px}
.plan li{list-style:none;display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-sub);font-size:14px;line-height:1.6;align-items:flex-start}
.plan li:last-child{border-bottom:none}
.plan input[type=checkbox]{appearance:none;width:20px;height:20px;min-width:20px;margin-top:1px;border:1.5px solid var(--grid);border-radius:6px;
  background:var(--surface2);cursor:pointer;position:relative}
.plan input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
.plan input[type=checkbox]:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#050606;font-size:13px;font-weight:800}
.plan li.done span{color:var(--muted);text-decoration:line-through}
/* --- flashcards --- */
.fc-stage{perspective:1000px;margin-bottom:12px}
.fc-card{position:relative;width:100%;min-height:240px;transform-style:preserve-3d;transition:transform .45s;cursor:pointer}
.fc-card.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--surface);border:1px solid var(--grid);border-radius:16px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:22px;text-align:center}
.fc-face.back{transform:rotateY(180deg);background:var(--surface2)}
.fc-front-text{font-family:var(--font-display);font-size:23px;font-weight:700;line-height:1.4}
.fc-back-text{font-size:15px;line-height:1.75;white-space:pre-wrap}
.fc-tag{position:absolute;top:13px;left:15px;font-size:10px;color:var(--muted);letter-spacing:.08em}
.fc-hint{position:absolute;bottom:13px;font-size:11px;color:var(--muted)}
.fc-speak{position:absolute;top:8px;right:10px;font-size:20px;padding:6px}
.fc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.fc-btns button{padding:13px 0;border-radius:10px;border:1px solid var(--grid);font-size:13px;font-weight:700;background:var(--surface)}
.fc-btns button:active{background:var(--surface2)}
.fc-btns .b-again{color:var(--bad)} .fc-btns .b-hard{color:var(--warn)}
.fc-btns .b-good{color:var(--accent)} .fc-btns .b-easy{color:var(--good)}
.fc-meta{text-align:center;font-size:11.5px;color:var(--muted);margin-bottom:10px;letter-spacing:.08em;font-variant-numeric:tabular-nums}
.fc-done{text-align:center;padding:44px 10px;color:var(--ink2);font-size:15px;line-height:2}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:26px 8px;line-height:1.9}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="lock">
  <div class="mark">LC</div>
  <h1>LESSON <span style="color:var(--accent)">COACH</span></h1>
  <p>ENGLISH ANALYTICS · PRIVATE</p>
  <input id="pass" type="password" autocomplete="current-password" placeholder="passphrase">
  <button id="unlock">開く</button>
  <div id="lockErr"></div>
</div>

<div id="app" class="hidden">
  <div class="wrap">
    <header class="app">
      <div class="brand">
        <div class="mark">LC</div>
        <div><h1>LESSON <span>COACH</span></h1><div class="sub2">ENGLISH ANALYTICS</div></div>

    <main id="view"></main>

    <button data-tab="reports"><span class="ico">📝</span>レポート</button>
    <button data-tab="pdf"><span class="ico">📄</span>PDF</button>
    <button data-tab="cards"><span class="ico">🃏</span>カード</button>
    <button data-tab="stats"><span class="ico">📈</span>統計</button>
  </nav>
</div>
<div id="tooltip"></div>

/* ============ 復号 ============ */
const b64d = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function decrypt(passphrase){
  const blob = JSON.parse(ENCRYPTED);
  const km = await crypto.subtle.importKey("raw", new TextEncoder().encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    {name:"PBKDF2", salt:b64d(blob.salt), iterations:250000, hash:"SHA-256"},
    km, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64d(blob.iv)}, key, b64d(blob.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}
async function tryUnlock(passphrase, silent){
  const err = document.getElementById("lockErr");
  try{
    document.getElementById("unlock").textContent = "復号中…";
    DB = await decrypt(passphrase);
    localStorage.setItem("elc-pass", passphrase);
    document.getElementById("lock").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    boot();
  }catch(e){
    document.getElementById("unlock").textContent = "開く";
    if(!silent) err.textContent = "パスフレーズが違います";
    localStorage.removeItem("elc-pass");
  }
}
document.getElementById("unlock").onclick = () => tryUnlock(document.getElementById("pass").value);
document.getElementById("pass").addEventListener("keydown", e => { if(e.key === "Enter") tryUnlock(e.target.value); });
if(ENCRYPTED === "__ENCRYPTED_PAYLOAD__"){
  document.getElementById("lockErr").textContent = "（未ビルドのテンプレートです。build_dashboard.mjs を実行してください）";
}else{
  const saved = localStorage.getItem("elc-pass");
  if(saved) tryUnlock(saved, true);
}

function showTT(html, x, y){

/* ============ SVGチャート ============ */
const NS = "http://www.w3.org/2000/svg";
function svgEl(tag, attrs){ const n = document.createElementNS(NS, tag); for(const k in attrs) n.setAttribute(k, attrs[k]); return n; }
function chartFrame(w, h, pad, yMax, yTicks){
  const svg = svgEl("svg", {viewBox:`0 0 ${w} ${h}`, width:"100%"});
  const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
  for(let i = 0; i <= yTicks; i++){
    const v = yMax * i / yTicks, y = pad.t + plotH - plotH * i / yTicks;
    if(i > 0) svg.appendChild(svgEl("line", {x1:pad.l, x2:pad.l+plotW, y1:y, y2:y, stroke:css("--grid"), "stroke-width":1}));
    const lbl = svgEl("text", {x:pad.l-6, y:y+3.5, "text-anchor":"end", "font-size":10, fill:css("--muted")});
    lbl.textContent = Math.round(v); svg.appendChild(lbl);
  }
  svg.appendChild(svgEl("line", {x1:pad.l, x2:pad.l+plotW, y1:pad.t+plotH, y2:pad.t+plotH, stroke:css("--axis"), "stroke-width":1}));
  return {svg, plotW, plotH};
}
function xLabels(svg, xs, labels, y){
  const step = Math.ceil(labels.length / 8);
  labels.forEach((l, i) => {
    if(i % step) return;
    const t = svgEl("text", {x:xs(i), y:y, "text-anchor":"middle", "font-size":10, fill:css("--muted")});
    t.textContent = l; svg.appendChild(t);
  });
}
/* 積み上げ棒: rows = [{label, parts:{cat:count}}] */
function stackedBar(rows, cats){
  const pad = {l:30, r:8, t:8, b:20}, w = Math.max(320, rows.length*44 + pad.l + pad.r), h = 200;
  const yMax = Math.max(4, ...rows.map(r => cats.reduce((s,c) => s + (r.parts[c]||0), 0)));
  const {svg, plotW, plotH} = chartFrame(w, h, pad, yMax, yMax <= 5 ? yMax : 4);
  const bw = Math.min(26, plotW / rows.length * .6);
  const xs = i => pad.l + plotW * (i + .5) / rows.length;
  rows.forEach((r, i) => {
    let acc = 0;
    const total = cats.reduce((s,c) => s + (r.parts[c]||0), 0);
    cats.forEach((c, ci) => {
      const v = r.parts[c] || 0; if(!v) return;
      const y0 = pad.t + plotH - plotH*acc/yMax, hgt = plotH*v/yMax;
      const isTop = acc + v === total;
      const rect = svgEl("rect", {x:xs(i)-bw/2, y:y0-hgt, width:bw, height:Math.max(hgt,1.5),
        fill:CAT_COLOR[c] || css("--c8"), stroke:css("--surface"), "stroke-width":2, rx:isTop?4:0});
      svg.appendChild(rect);
      acc += v;
    });
    if(total > 0){
      const lbl = svgEl("text", {x:xs(i), y:Math.max(10, pad.t + plotH - plotH*total/yMax - 5), "text-anchor":"middle",
        "font-size":10, "font-weight":600, fill:css("--ink2")});
      lbl.textContent = total; svg.appendChild(lbl);
    }
    const hit = svgEl("rect", {x:xs(i)-plotW/rows.length/2, y:pad.t, width:plotW/rows.length, height:plotH, fill:"transparent"});
    hit.addEventListener("pointermove", e => {
      const items = cats.filter(c => r.parts[c]).map(c =>
        `<div class="tt-row"><i style="background:${CAT_COLOR[c]}"></i>${esc(c)}<b>${r.parts[c]}</b></div>`).join("");
      showTT(`<div class="tt-title">${esc(r.label)}</div>${items || "ミスなし 🎉"}`, e.clientX, e.clientY);
    });
    hit.addEventListener("pointerleave", hideTT);
    svg.appendChild(hit);
  });
  xLabels(svg, xs, rows.map(r => r.label), h - 6);
  return svg;
}
/* 折れ線: series = [{name, color, values}] , labels = x軸 */
function lineChart(labels, series, unit){
  const pad = {l:34, r:12, t:10, b:20}, w = Math.max(320, labels.length*40 + pad.l + pad.r), h = 190;
  const yMax = Math.ceil(Math.max(4, ...series.flatMap(s => s.values.filter(v => v != null))) * 1.15);
  const {svg, plotW, plotH} = chartFrame(w, h, pad, yMax, yMax <= 5 ? yMax : 4);
  const xs = i => pad.l + (labels.length === 1 ? plotW/2 : plotW * i / (labels.length-1));
  const ys = v => pad.t + plotH - plotH * v / yMax;
  series.forEach(s => {
    const pts = s.values.map((v,i) => v == null ? null : [xs(i), ys(v)]).filter(Boolean);
    if(pts.length > 1)
      svg.appendChild(svgEl("path", {d:"M" + pts.map(p => p.join(",")).join("L"), fill:"none", stroke:s.color, "stroke-width":2, "stroke-linejoin":"round"}));
    pts.forEach(p => svg.appendChild(svgEl("circle", {cx:p[0], cy:p[1], r:4, fill:s.color, stroke:css("--surface"), "stroke-width":2})));
    // 直接ラベル: 最後の点にだけ値を出す
    const lastIdx = s.values.length - 1, lastV = s.values[lastIdx];
    if(lastV != null){
      const t = svgEl("text", {x:xs(lastIdx), y:ys(lastV)-8, "text-anchor":"middle", "font-size":10, "font-weight":600, fill:css("--ink2")});
      t.textContent = lastV; svg.appendChild(t);
    }
  });
  labels.forEach((l, i) => {
    const hit = svgEl("rect", {x:xs(i)-plotW/Math.max(labels.length,1)/2, y:pad.t, width:plotW/Math.max(labels.length,1), height:plotH, fill:"transparent"});
    hit.addEventListener("pointermove", e => {
      const rows = series.map(s => s.values[i] == null ? "" :
        `<div class="tt-row"><i style="background:${s.color}"></i>${esc(s.name)}<b>${s.values[i]}${unit||""}</b></div>`).join("");
      showTT(`<div class="tt-title">${esc(l)}</div>${rows}`, e.clientX, e.clientY);
    });
    hit.addEventListener("pointerleave", hideTT);
    svg.appendChild(hit);
  });
  xLabels(svg, xs, labels, h - 6);
  return svg;
}
function legendFor(names, colors){
  const lg = el("div", "legend");
  names.forEach((n,i) => { const s = el("span"); s.innerHTML = `<i style="background:${colors[i]}"></i>${esc(n)}`; lg.appendChild(s); });
  return lg;
}

function tile(lbl, val, unit, delta, goodWhenDown){
  const t = el("div", "tile");
  let d = "";
  if(delta != null && isFinite(delta) && delta !== 0){
    const better = goodWhenDown ? delta < 0 : delta > 0;
    d = `<div class="delta ${better ? "up" : "down"}">${delta > 0 ? "+" : ""}${delta} 前回比</div>`;
  } else if(delta === 0){ d = `<div class="delta">±0 前回比</div>`; }
  t.innerHTML = `<div class="lbl">${esc(lbl)}</div><div class="val">${esc(val)}<small> ${unit||""}</small></div>${d}`;
  return t;

/* ============ レポート ============ */
function miniMd(src){
  const lines = src.split("\n"); let html = "", inUl = false, tbl = [];
  const inline = s => esc(s)
    .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const flushTbl = () => {
    if(!tbl.length) return;
    const head = tbl[0], body = tbl.slice(1).filter(r => !/^[\s|:-]+$/.test(r.join("")));
    html += `<div class="tblwrap"><table><thead><tr>${head.map(c => `<th>${inline(c)}</th>`).join("")}</tr></thead><tbody>` +
      body.map(r => `<tr>${r.map(c => `<td>${inline(c)}</td>`).join("")}</tr>`).join("") + "</tbody></table></div>";
    tbl = [];
  };
  const closeUl = () => { if(inUl){ html += "</ul>"; inUl = false; } };
  for(const raw of lines){
    const line = raw.replace(/\s+$/, "");
    if(/^\s*\|.*\|\s*$/.test(line)){ closeUl(); tbl.push(line.trim().slice(1,-1).split("|").map(c => c.trim())); continue; }
    flushTbl();
    let mh;
    if((mh = line.match(/^(#{1,3})\s+(.*)/))){ closeUl(); html += `<h${mh[1].length}>${inline(mh[2])}</h${mh[1].length}>`; }
    else if(/^\s*[-*]\s+/.test(line)){ if(!inUl){ html += "<ul>"; inUl = true; } html += `<li>${inline(line.replace(/^\s*[-*]\s+/,""))}</li>`; }
    else if(line.trim() === ""){ closeUl(); }
    else if(/^\s*>\s?/.test(line)){ closeUl(); html += `<p style="color:var(--muted);font-size:12.5px">${inline(line.replace(/^\s*>\s?/,""))}</p>`; }
    else { closeUl(); html += `<p>${inline(line)}</p>`; }
  }
  flushTbl(); closeUl();
  return html;
}

/* ============ フラッシュカード (SRS: SM-2簡易版) ============ */
const SRS_KEY = "elc-srs";
const srsLoad = () => JSON.parse(localStorage.getItem(SRS_KEY) || "{}");
const srsSave = s => localStorage.setItem(SRS_KEY, JSON.stringify(s));
const today = () => new Date().toISOString().slice(0,10);
function dueCards(){
  const st = srsLoad(), t = today();
  return (DB.cards?.cards || []).filter(c => !st[c.id] || st[c.id].due <= t);
}
function rate(card, grade){ // 0=again 1=hard 2=good 3=easy
  const st = srsLoad();
  const s = st[card.id] || {interval:0, ease:2.5};
  if(grade === 0){ s.interval = 0; }
  else{
    s.ease = Math.max(1.3, s.ease + [0,-0.15,0,0.15][grade]);
    if(s.interval === 0) s.interval = grade === 1 ? 1 : (grade === 3 ? 4 : 2);
    else s.interval = Math.round(s.interval * (grade === 1 ? 1.2 : s.ease * (grade === 3 ? 1.3 : 1)));
    s.interval = Math.min(s.interval, 365);
  }
  const d = new Date(); d.setDate(d.getDate() + s.interval);
  s.due = d.toISOString().slice(0,10);
  st[card.id] = s; srsSave(st);
}
let clipPlayer = null;
function speak(text, audioDataUri){
  if(audioDataUri){ // 先生の実音声（シャドーイング素材）を優先
    if(clipPlayer) clipPlayer.pause();
    clipPlayer = new Audio(audioDataUri);
    clipPlayer.play();
    return;
  }
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.95;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith("en"));
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
if("speechSynthesis" in window) speechSynthesis.getVoices(); // iOSの音声リスト初期化
function renderCards(){
  const all = DB.cards?.cards || [];
  if(!all.length){ view.appendChild(el("div","card","<div class='empty'>カードがまだありません</div>")); return; }
  let queue = dueCards(); // セッション内キュー(againは末尾へ戻す)
  const meta = el("div","fc-meta");
  const stage = el("div","fc-stage");
  const btns = el("div","fc-btns");
  btns.innerHTML = `<button class="b-again">もう一度</button><button class="b-hard">難しい</button>
    <button class="b-good">OK</button><button class="b-easy">簡単</button>`;
  view.appendChild(meta); view.appendChild(stage); view.appendChild(btns);

  let cardNode = null;
  function draw(){
    stage.innerHTML = ""; btns.style.visibility = queue.length ? "visible" : "hidden";
    meta.textContent = `残り ${queue.length} 枚 / 全 ${all.length} 枚`;
    if(!queue.length){
      stage.appendChild(el("div","fc-done","🎉 今日の復習は完了！<br><small>また明日開いてください</small>"));
      return;
    }
    const c = queue[0];
    cardNode = el("div","fc-card");
    cardNode.innerHTML = `
      <div class="fc-face">
        <span class="fc-tag">${esc((c.tags||[]).join(" · "))} · ${esc(c.date||"")}</span>
        <button class="fc-speak" aria-label="読み上げ">${c.audio ? "🎧" : "🔊"}</button>
        <div class="fc-front-text">${esc(c.front)}</div>
        <span class="fc-hint">${c.audio ? "🎧=先生の実音声 · " : ""}タップで答えを見る</span>
      </div>
      <div class="fc-face back">
        <button class="fc-speak" aria-label="読み上げ">${c.audio ? "🎧" : "🔊"}</button>
        <div class="fc-back-text">${esc(c.back)}</div>
      </div>`;
    cardNode.onclick = e => { if(e.target.closest(".fc-speak")) return; cardNode.classList.toggle("flip"); };
    cardNode.querySelectorAll(".fc-speak").forEach(b => b.onclick = () => speak(c.front, c.audio));
    stage.appendChild(cardNode);
  }
  btns.querySelectorAll("button").forEach((b, grade) => b.onclick = () => {
    const c = queue.shift();
    rate(c, grade);
    if(grade === 0) queue.push(c); // このセッション中にもう一度出す
    draw();
  });
  draw();
}

  if(ls.some(l => l.metrics?.fillers != null))

  const cum = []; let acc = 0;
  ls.forEach(l => { acc += (l.expressions||[]).length; cum.push(acc); });
  add("学んだ表現の累計", [{name:"表現", color:C2, values:cum}], "");

  // 発音要注意ワード（指摘された回数つき・多い順）
  const flagCnt = {};
  ls.forEach(l => (l.pronunciationFlags || []).forEach(f => flagCnt[f] = (flagCnt[f]||0) + 1));
  const flags = Object.entries(flagCnt).sort((a,b) => b[1] - a[1]);
  if(flags.length){
    const c = el("div","card","<h2>🗣 発音要注意ワード</h2>");
    const wrap = el("div","");
    flags.forEach(([f,n]) => {
      const b = el("button","ghostbtn",`🔊 ${esc(f)}${n > 1 ? ` <b style="color:var(--bad)">×${n}</b>` : ""}`);
      b.style.margin = "3px";
      b.onclick = () => speak(f);
      wrap.appendChild(b);
    });
    c.appendChild(wrap);
    c.appendChild(el("div","", `<div style="font-size:11px;color:var(--muted);margin-top:8px">Whisperに誤認識された＝通じにくい可能性のある単語。タップでお手本発音を再生。</div>`));
    view.appendChild(c);
  }
}
