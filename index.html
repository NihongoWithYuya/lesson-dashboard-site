<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#050606">
<title>English Muscle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme: dark;
  --page:#050606; --nav:#080909; --surface:#121212; --surface2:#171717;
  --ink:#F2F2F2; --ink2:#A6A6A6; --muted:#777777;
  --grid:#242424; --axis:#3a3a3a; --border:#242424; --border-sub:#1A1A1A;
  --accent:#00F5F5; --accent-hov:#00DCDC; --accent-sub:#062222;
  --good:#64FF6A; --bad:#FF174D; --warn:#FFF59C;
  --c1:#3987e5; --c2:#199e70; --c3:#c98500; --c4:#008300; --c5:#9085e9; --c6:#e66767; --c7:#d55181; --c8:#d95926;
  --font-display:"Space Grotesk","DM Sans","Hiragino Sans",sans-serif;
  --sidew:288px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans","Hiragino Sans","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
  background:var(--page);color:var(--ink);font-size:22px;
  -webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;transition:all .15s ease-out}
a{color:var(--accent)}
/* ===== layout: sidebar + main ===== */
#side{position:fixed;left:0;top:0;bottom:0;width:var(--sidew);z-index:40;
  background:var(--nav);border-right:1px solid var(--border-sub);
  display:flex;flex-direction:column;padding:22px 14px calc(16px + env(safe-area-inset-bottom));overflow-y:auto}
#side .brand{display:flex;align-items:center;gap:12px;padding:2px 8px 22px}
#side .mark{width:46px;height:46px;min-width:46px;border-radius:12px;background:var(--accent-sub);border:1px solid #0a3535;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--accent);font-size:20px;letter-spacing:.02em}
#side h1{font-family:var(--font-display);font-size:20px;font-weight:700;letter-spacing:.04em;line-height:1.15}
#side h1 span{color:var(--accent)}
#side .sub2{font-size:11px;color:var(--muted);letter-spacing:.22em;margin-top:4px;font-weight:500}
#side nav{display:flex;flex-direction:column;gap:3px}
#side nav button{display:flex;align-items:center;gap:13px;padding:14px 14px;border-radius:12px;
  color:var(--ink2);font-size:19px;font-weight:500;text-align:left;border-left:3px solid transparent}
#side nav button .ico{font-size:22px;line-height:1;filter:grayscale(1) opacity(.55);width:26px;text-align:center}
#side nav button:hover{background:var(--surface)}
#side nav button.on{background:var(--accent-sub);color:var(--accent);font-weight:700;border-left-color:var(--accent)}
#side nav button.on .ico{filter:none}
#side .foot{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding:14px 4px 0}
#langBtn{display:flex;align-items:center;gap:9px;justify-content:center;padding:13px;border-radius:12px;
  border:1px solid var(--grid);background:var(--surface);font-size:18px;font-weight:600;color:var(--ink2)}
#langBtn:hover{color:var(--accent);border-color:var(--accent)}
#genAt{font-size:14px;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums;letter-spacing:.06em}
#scrim{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;display:none}
.main{margin-left:var(--sidew)}
.wrap{max-width:1000px;margin:0 auto;padding:26px 28px 70px}
/* mobile header */
header.mob{display:none}
@media (max-width:900px){
  #side{transform:translateX(-100%);transition:transform .22s ease-out;box-shadow:8px 0 32px rgba(0,0,0,.5)}
  #side.open{transform:translateX(0)}
  #scrim.show{display:block}
  .main{margin-left:0}
  .wrap{padding:16px 15px 70px}
  header.mob{display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:20;
    background:rgba(5,6,6,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border-sub);
    padding:13px 15px;padding-top:calc(13px + env(safe-area-inset-top))}
  header.mob .burger{font-size:26px;padding:3px 10px;border:1px solid var(--grid);border-radius:10px;background:var(--surface)}
  header.mob .t{font-family:var(--font-display);font-size:19px;font-weight:700;letter-spacing:.05em}
  header.mob .t span{color:var(--accent)}
  header.mob .chip{margin-left:auto;font-size:14px;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:4px 12px;font-variant-numeric:tabular-nums}
}
/* --- status banner --- */
.status-banner{display:flex;align-items:center;gap:14px;padding:15px 17px;border-radius:14px;
  background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);margin-bottom:16px;font-size:19px}
.status-banner.run{border-left-color:var(--warn)}
.status-banner.err{border-left-color:var(--bad)}
.status-banner .st-ico{font-size:26px}
.status-banner .st-msg{font-weight:600}
.status-banner .st-sub{font-size:15px;color:var(--muted);margin-top:3px}
/* --- cards --- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px}
.card h2{font-size:16px;font-weight:600;color:var(--muted);letter-spacing:.1em;margin-bottom:14px}
.prep-exp{padding:13px 0;border-bottom:1px solid var(--border-sub)}
.prep-exp:last-child{border-bottom:none}
.prep-exp .en{font-size:22px;font-weight:700;font-family:var(--font-display)}
.prep-exp .ja{font-size:18px;color:var(--ink2);margin-top:3px}
.prep-exp button{float:right;font-size:26px;padding:2px 10px}
.bigbtn{display:block;width:100%;text-align:center;padding:16px;border-radius:12px;
  background:var(--accent);color:#050606;font-weight:700;font-size:20px;margin-top:14px;letter-spacing:.02em}
.bigbtn:active{background:var(--accent-hov)}
.ghostbtn{display:inline-block;padding:12px 20px;border-radius:12px;border:1px solid var(--grid);
  color:var(--accent);font-size:19px;font-weight:600;background:var(--surface2)}
.ghostbtn:active{border-color:var(--accent)}
/* --- lock screen --- */
#lock{max-width:420px;margin:18vh auto 0;text-align:center;padding:26px}
#lock .mark{width:70px;height:70px;margin:0 auto 18px;border-radius:18px;background:var(--accent-sub);border:1px solid #0a3535;
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;color:var(--accent);font-size:28px}
#lock h1{font-family:var(--font-display);font-size:26px;letter-spacing:.05em;margin-bottom:6px}
#lock p{font-size:17px;color:var(--muted);margin-bottom:24px;letter-spacing:.05em}
#lock input{width:100%;padding:16px;border:1px solid var(--grid);border-radius:12px;font-size:22px;
  background:var(--surface);color:var(--ink);text-align:center;outline:none}
#lock input:focus{border-color:var(--accent)}
#lock button{width:100%;margin-top:12px;padding:16px;border-radius:12px;background:var(--accent);color:#050606;font-weight:700;font-size:20px}
#lockErr{color:var(--bad);font-size:18px;margin-top:14px;min-height:1em}
/* --- stat tiles --- */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:14px}
.tile{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.tile .lbl{font-size:14px;color:var(--muted);margin-bottom:8px;letter-spacing:.12em;font-weight:500}
.tile .val{font-family:var(--font-display);font-size:42px;font-weight:700;line-height:1;font-variant-numeric:tabular-nums}
.tile .val small{font-size:17px;font-weight:500;color:var(--muted);font-family:"DM Sans","Hiragino Sans",sans-serif}
.tile .delta{font-size:15px;margin-top:8px;color:var(--ink2);font-variant-numeric:tabular-nums}
.tile .delta.up{color:var(--good)}
.tile .delta.down{color:var(--bad)}
/* --- lists / badges --- */
.repeat li{display:flex;align-items:center;gap:13px;padding:13px 0;border-bottom:1px solid var(--border-sub);list-style:none;font-size:20px}
.repeat li:last-child{border-bottom:none}
.badge{min-width:52px;text-align:center;font-size:16px;font-weight:700;border-radius:8px;padding:5px 11px;
  background:var(--bad);color:#fff;font-variant-numeric:tabular-nums}
.badge.low{background:var(--surface2);border:1px solid var(--grid);color:var(--ink2)}
.repeat .cat{font-size:15px;color:var(--muted);margin-left:auto;white-space:nowrap}
.tag{display:inline-block;font-size:14px;font-weight:700;letter-spacing:.06em;border-radius:7px;padding:4px 11px;margin-right:10px;vertical-align:2px}
.tag.hot{background:#2b0a12;color:var(--bad);border:1px solid #4d1120}
.tag.cyan{background:var(--accent-sub);color:var(--accent);border:1px solid #0a3535}
.tag.dim{background:var(--surface2);color:var(--muted);border:1px solid var(--grid)}
/* --- legend / charts --- */
.legend{display:flex;flex-wrap:wrap;gap:8px 18px;margin-top:12px}
.legend span{display:flex;align-items:center;gap:8px;font-size:16px;color:var(--ink2)}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.chart{width:100%;overflow-x:auto}
.chart svg{display:block}
.chart text{font-family:"DM Sans",sans-serif}
#tooltip{position:fixed;z-index:50;pointer-events:none;background:var(--surface2);border:1px solid var(--grid);
  border-radius:10px;padding:11px 14px;font-size:18px;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;max-width:320px}
#tooltip .tt-title{font-weight:600;margin-bottom:5px}
#tooltip .tt-row{display:flex;align-items:center;gap:8px;color:var(--ink2)}
#tooltip .tt-row i{width:11px;height:11px;border-radius:3px;display:inline-block}
#tooltip .tt-row b{margin-left:auto;color:var(--ink);font-variant-numeric:tabular-nums}
/* --- reports --- */
.datebar{display:flex;gap:10px;overflow-x:auto;padding-bottom:10px;margin-bottom:10px}
.datebar button{white-space:nowrap;padding:9px 18px;border-radius:999px;border:1px solid var(--grid);font-size:18px;
  color:var(--ink2);font-variant-numeric:tabular-nums;background:var(--surface)}
.datebar button.on{background:var(--accent);border-color:var(--accent);color:#050606;font-weight:700}
.md{font-size:20px;line-height:1.8}
.md h1{font-family:var(--font-display);font-size:25px;margin:16px 0 10px;letter-spacing:.02em}
.md h2{font-size:21px;margin:22px 0 8px;padding-bottom:7px;border-bottom:1px solid var(--grid);color:var(--accent);font-weight:700}
.md h3{font-size:20px;margin:14px 0 5px}
.md p{margin:8px 0}
.md ul{margin:8px 0 8px 26px}
.md code{background:var(--surface2);border:1px solid var(--grid);border-radius:6px;padding:1px 7px;font-size:18px}
.md .tblwrap{overflow-x:auto;margin:10px 0;border:1px solid var(--grid);border-radius:10px}
.md table{border-collapse:collapse;font-size:18px;min-width:100%}
.md th,.md td{border-bottom:1px solid var(--border-sub);border-right:1px solid var(--border-sub);padding:10px 13px;text-align:left;vertical-align:top}
.md th{background:var(--surface2);color:var(--ink2);font-weight:600;white-space:nowrap}
.md tr:last-child td{border-bottom:none}
.md th:last-child,.md td:last-child{border-right:none}
/* --- pdf tab --- */
.xlist li{list-style:none;padding:14px 0;border-bottom:1px solid var(--border-sub);font-size:20px;line-height:1.6}
.xlist li:last-child{border-bottom:none}
.xlist .note{display:block;font-size:16px;color:var(--muted);margin-top:4px}
.plan li{list-style:none;display:flex;gap:13px;padding:13px 0;border-bottom:1px solid var(--border-sub);font-size:20px;line-height:1.6;align-items:flex-start}
.plan li:last-child{border-bottom:none}
.plan input[type=checkbox]{appearance:none;width:28px;height:28px;min-width:28px;margin-top:2px;border:2px solid var(--grid);border-radius:8px;
  background:var(--surface2);cursor:pointer;position:relative}
.plan input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
.plan input[type=checkbox]:checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:#050606;font-size:18px;font-weight:800}
.plan li.done span{color:var(--muted);text-decoration:line-through}
/* --- flashcards --- */
.fc-stage{perspective:1000px;margin-bottom:14px;max-width:640px}
.fc-card{position:relative;width:100%;min-height:320px;transform-style:preserve-3d;transition:transform .45s;cursor:pointer}
.fc-card.flip{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
  background:var(--surface);border:1px solid var(--grid);border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:28px;text-align:center}
.fc-face.back{transform:rotateY(180deg);background:var(--surface2)}
.fc-front-text{font-family:var(--font-display);font-size:33px;font-weight:700;line-height:1.4}
.fc-back-text{font-size:21px;line-height:1.75;white-space:pre-wrap}
.fc-tag{position:absolute;top:16px;left:18px;font-size:14px;color:var(--muted);letter-spacing:.08em}
.fc-hint{position:absolute;bottom:16px;font-size:15px;color:var(--muted)}
.fc-speak{position:absolute;top:10px;right:12px;font-size:28px;padding:8px}
.fc-btns{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:640px}
.fc-btns button{padding:16px 0;border-radius:12px;border:1px solid var(--grid);font-size:19px;font-weight:700;background:var(--surface)}
.fc-btns button:active{background:var(--surface2)}
.fc-btns .b-again{color:var(--bad)} .fc-btns .b-hard{color:var(--warn)}
.fc-btns .b-good{color:var(--accent)} .fc-btns .b-easy{color:var(--good)}
.fc-meta{font-size:16px;color:var(--muted);margin-bottom:12px;letter-spacing:.08em;font-variant-numeric:tabular-nums;max-width:640px;text-align:center}
.fc-done{text-align:center;padding:52px 12px;color:var(--ink2);font-size:21px;line-height:2}
.empty{color:var(--muted);font-size:19px;text-align:center;padding:32px 10px;line-height:1.9}
.hidden{display:none!important}
</style>
</head>
<body>

<div id="lock">
  <div class="mark">EM</div>
  <h1>ENGLISH <span style="color:var(--accent)">MUSCLE</span></h1>
  <p id="lockSub">TRAINING ANALYTICS · PRIVATE</p>
  <input id="pass" type="password" autocomplete="current-password" placeholder="passphrase">
  <button id="unlock">Unlock</button>
  <div id="lockErr"></div>
</div>

<div id="app" class="hidden">
  <div id="scrim"></div>
  <aside id="side">
    <div class="brand">
      <div class="mark">EM</div>
      <div><h1>ENGLISH <span>MUSCLE</span></h1><div class="sub2">TRAINING ANALYTICS</div></div>

      <button data-tab="reports"><span class="ico">📝</span><span class="lbl"></span></button>
      <button data-tab="pdf"><span class="ico">📄</span><span class="lbl"></span></button>
      <button data-tab="cards"><span class="ico">🃏</span><span class="lbl"></span></button>
      <button data-tab="stats"><span class="ico">📈</span><span class="lbl"></span></button>
    </nav>
    <div class="foot">
      <button id="langBtn">🌐 <span id="langLbl">English</span></button>
      <div id="genAt"></div>
    </div>
  </aside>
  <div class="main">
    <header class="mob">
      <button class="burger" id="burger">☰</button>
      <span class="t">ENGLISH <span>MUSCLE</span></span>
      <span class="chip" id="genAtM"></span>
    </header>
    <div class="wrap"><main id="view"></main></div>
  </div>
</div>
<div id="tooltip"></div>

const tt = document.getElementById("tooltip");
function showTT(html, x, y){
  tt.innerHTML = html; tt.style.display = "block";
  const r = tt.getBoundingClientRect();
  tt.style.left = Math.min(Math.max(6, x - r.width/2), innerWidth - r.width - 6) + "px";

/* ============ SVGチャート ============ */
const NS = "http://www.w3.org/2000/svg";
const CHF = 14; // チャート内フォントサイズ
function svgEl(tag, attrs){ const n = document.createElementNS(NS, tag); for(const k in attrs) n.setAttribute(k, attrs[k]); return n; }
function chartFrame(w, h, pad, yMax, yTicks){
  const svg = svgEl("svg", {viewBox:`0 0 ${w} ${h}`, width:"100%"});
  const plotW = w - pad.l - pad.r, plotH = h - pad.t - pad.b;
  for(let i = 0; i <= yTicks; i++){
    const v = yMax * i / yTicks, y = pad.t + plotH - plotH * i / yTicks;
    if(i > 0) svg.appendChild(svgEl("line", {x1:pad.l, x2:pad.l+plotW, y1:y, y2:y, stroke:css("--grid"), "stroke-width":1}));
    const lbl = svgEl("text", {x:pad.l-8, y:y+5, "text-anchor":"end", "font-size":CHF, fill:css("--muted")});
    lbl.textContent = Math.round(v); svg.appendChild(lbl);
  }
  svg.appendChild(svgEl("line", {x1:pad.l, x2:pad.l+plotW, y1:pad.t+plotH, y2:pad.t+plotH, stroke:css("--axis"), "stroke-width":1}));
  return {svg, plotW, plotH};
}
function xLabels(svg, xs, labels, y){
  const step = Math.ceil(labels.length / 8);
  labels.forEach((l, i) => {
    if(i % step) return;
    const t2 = svgEl("text", {x:xs(i), y:y, "text-anchor":"middle", "font-size":CHF, fill:css("--muted")});
    t2.textContent = l; svg.appendChild(t2);
  });
}
/* 積み上げ棒: rows = [{label, parts:{cat:count}}] */
function stackedBar(rows, cats){
  const pad = {l:44, r:10, t:12, b:28}, w = Math.max(380, rows.length*56 + pad.l + pad.r), h = 250;
  const yMax = Math.max(4, ...rows.map(r => cats.reduce((s,c) => s + (r.parts[c]||0), 0)));
  const {svg, plotW, plotH} = chartFrame(w, h, pad, yMax, yMax <= 5 ? yMax : 4);
  const bw = Math.min(32, plotW / rows.length * .6);
  const xs = i => pad.l + plotW * (i + .5) / rows.length;
  rows.forEach((r, i) => {
    let acc = 0;
    const total = cats.reduce((s,c) => s + (r.parts[c]||0), 0);
    cats.forEach((c, ci) => {
      const v = r.parts[c] || 0; if(!v) return;
      const y0 = pad.t + plotH - plotH*acc/yMax, hgt = plotH*v/yMax;
      const isTop = acc + v === total;
      const rect = svgEl("rect", {x:xs(i)-bw/2, y:y0-hgt, width:bw, height:Math.max(hgt,1.5),
        fill:CAT_COLOR[c] || css("--c8"), stroke:css("--surface"), "stroke-width":2, rx:isTop?4:0});
      svg.appendChild(rect);
      acc += v;
    });
    if(total > 0){
      const lbl = svgEl("text", {x:xs(i), y:Math.max(CHF, pad.t + plotH - plotH*total/yMax - 6), "text-anchor":"middle",
        "font-size":CHF, "font-weight":600, fill:css("--ink2")});
      lbl.textContent = total; svg.appendChild(lbl);
    }
    const hit = svgEl("rect", {x:xs(i)-plotW/rows.length/2, y:pad.t, width:plotW/rows.length, height:plotH, fill:"transparent"});
    hit.addEventListener("pointermove", e => {
      const items = cats.filter(c => r.parts[c]).map(c =>
        `<div class="tt-row"><i style="background:${CAT_COLOR[c]}"></i>${esc(catName(c))}<b>${r.parts[c]}</b></div>`).join("");
      showTT(`<div class="tt-title">${esc(r.label)}</div>${items || t("noMistakes")}`, e.clientX, e.clientY);
    });
    hit.addEventListener("pointerleave", hideTT);
    svg.appendChild(hit);
  });
  xLabels(svg, xs, rows.map(r => r.label), h - 8);
  return svg;
}
/* 折れ線: series = [{name, color, values}] , labels = x軸 */
function lineChart(labels, series, unit){
  const pad = {l:50, r:16, t:14, b:28}, w = Math.max(380, labels.length*52 + pad.l + pad.r), h = 240;
  const yMax = Math.ceil(Math.max(4, ...series.flatMap(s => s.values.filter(v => v != null))) * 1.15);
  const {svg, plotW, plotH} = chartFrame(w, h, pad, yMax, yMax <= 5 ? yMax : 4);
  const xs = i => pad.l + (labels.length === 1 ? plotW/2 : plotW * i / (labels.length-1));
  const ys = v => pad.t + plotH - plotH * v / yMax;
  series.forEach(s => {
    const pts = s.values.map((v,i) => v == null ? null : [xs(i), ys(v)]).filter(Boolean);
    if(pts.length > 1)
      svg.appendChild(svgEl("path", {d:"M" + pts.map(p => p.join(",")).join("L"), fill:"none", stroke:s.color, "stroke-width":2.5, "stroke-linejoin":"round"}));
    pts.forEach(p => svg.appendChild(svgEl("circle", {cx:p[0], cy:p[1], r:5, fill:s.color, stroke:css("--surface"), "stroke-width":2})));
    const lastIdx = s.values.length - 1, lastV = s.values[lastIdx];
    if(lastV != null){
      const t2 = svgEl("text", {x:xs(lastIdx), y:ys(lastV)-10, "text-anchor":"middle", "font-size":CHF, "font-weight":600, fill:css("--ink2")});
      t2.textContent = lastV; svg.appendChild(t2);
    }
  });
  labels.forEach((l, i) => {
    const hit = svgEl("rect", {x:xs(i)-plotW/Math.max(labels.length,1)/2, y:pad.t, width:plotW/Math.max(labels.length,1), height:plotH, fill:"transparent"});
    hit.addEventListener("pointermove", e => {
      const rows = series.map(s => s.values[i] == null ? "" :
        `<div class="tt-row"><i style="background:${s.color}"></i>${esc(s.name)}<b>${s.values[i]}${unit||""}</b></div>`).join("");
      showTT(`<div class="tt-title">${esc(l)}</div>${rows}`, e.clientX, e.clientY);
    });
    hit.addEventListener("pointerleave", hideTT);
    svg.appendChild(hit);
  });
  xLabels(svg, xs, labels, h - 8);
  return svg;
}

  names.forEach((n,i) => { const s = el("span"); s.innerHTML = `<i style="background:${colors[i]}"></i>${esc(n)}`; lg.appendChild(s); });

}

function tile(lbl, val, unit, delta, goodWhenDown){
  const t2 = el("div", "tile");

    const better = goodWhenDown ? delta < 0 : delta > 0;
    d = `<div class="delta ${better ? "up" : "down"}">${delta > 0 ? "+" : ""}${delta} ${t("vsLast")}</div>`;
  } else if(delta === 0){ d = `<div class="delta">±0 ${t("vsLast")}</div>`; }
  t2.innerHTML = `<div class="lbl">${esc(lbl)}</div><div class="val">${esc(val)}<small> ${unit||""}</small></div>${d}`;
  return t2;
}

/* ============ レポート ============ */
function miniMd(src){
  const lines = src.split("\n"); let html = "", inUl = false, tbl = [];
  const inline = s => esc(s)
    .replace(/\*\*(.+?)\*\*/g, "<b>$1</b>")
    .replace(/`([^`]+)`/g, "<code>$1</code>");
  const flushTbl = () => {
    if(!tbl.length) return;
    const head = tbl[0], body = tbl.slice(1).filter(r => !/^[\s|:-]+$/.test(r.join("")));
    html += `<div class="tblwrap"><table><thead><tr>${head.map(c => `<th>${inline(c)}</th>`).join("")}</tr></thead><tbody>` +
      body.map(r => `<tr>${r.map(c => `<td>${inline(c)}</td>`).join("")}</tr>`).join("") + "</tbody></table></div>";
    tbl = [];
  };
  const closeUl = () => { if(inUl){ html += "</ul>"; inUl = false; } };
  for(const raw of lines){
    const line = raw.replace(/\s+$/, "");
    if(/^\s*\|.*\|\s*$/.test(line)){ closeUl(); tbl.push(line.trim().slice(1,-1).split("|").map(c => c.trim())); continue; }
    flushTbl();
    let mh;
    if((mh = line.match(/^(#{1,3})\s+(.*)/))){ closeUl(); html += `<h${mh[1].length}>${inline(mh[2])}</h${mh[1].length}>`; }
    else if(/^\s*[-*]\s+/.test(line)){ if(!inUl){ html += "<ul>"; inUl = true; } html += `<li>${inline(line.replace(/^\s*[-*]\s+/,""))}</li>`; }
    else if(line.trim() === ""){ closeUl(); }
    else if(/^\s*>\s?/.test(line)){ closeUl(); html += `<p style="color:var(--muted);font-size:17px">${inline(line.replace(/^\s*>\s?/,""))}</p>`; }
    else { closeUl(); html += `<p>${inline(line)}</p>`; }
  }
  flushTbl(); closeUl();
  return html;
}

  return DB.reports[d];

        ul.appendChild(li);
      });
      c.appendChild(ul);
      body.appendChild(c);
    }

    const cc = p.crossCheck || {};
    const section = (title, items, tagCls, tagLabel) => {
      if(!items?.length) return;
      const c = el("div","card",`<h2>${title}</h2>`);
      const ul = el("ul","xlist");
      items.forEach(x => {
        const li = el("li");
        const note = pick(x, "note");
        li.innerHTML = `<span class="tag ${tagCls}">${tagLabel}</span>${esc(pick(x, "item"))}
          ${note ? `<span class="note">${esc(note)}</span>` : ""}`;
        ul.appendChild(li);
      });
      c.appendChild(ul);
      body.appendChild(c);
    };
    section(t("ccBoth"), cc.both, "hot", t("tagBoth"));
    section(t("ccTeacher"), cc.teacherOnly, "cyan", t("tagPdf"));
    section(t("ccRec"), cc.recordingOnly, "dim", t("tagRec"));

    if(p.teacherPoints?.length){
      const c = el("div","card",`<h2>${t("teacherPoints")}</h2>`);
      const ul = el("ul","xlist");
      p.teacherPoints.forEach(tp => {
        const li = el("li");
        li.innerHTML = `${esc(pick(tp, "point"))}${tp.example ? `<span class="note" style="color:var(--accent)">${esc(tp.example)}</span>` : ""}`;
        ul.appendChild(li);
      });
      c.appendChild(ul);
      body.appendChild(c);
    }
  };
  dates.forEach(d => { const b = el("button","",esc(d)); b.dataset.d = d; b.onclick = () => show(d); bar.appendChild(b); });
  view.appendChild(bar); view.appendChild(body);
  show(dates[0]);
}

/* ============ フラッシュカード (SRS: SM-2簡易版) ============ */
const SRS_KEY = "elc-srs";
const srsLoad = () => JSON.parse(localStorage.getItem(SRS_KEY) || "{}");
const srsSave = s => localStorage.setItem(SRS_KEY, JSON.stringify(s));
const today = () => new Date().toISOString().slice(0,10);
function dueCards(){
  const st = srsLoad(), t2 = today();
  return (DB.cards?.cards || []).filter(c => !st[c.id] || st[c.id].due <= t2);
}
function rate(card, grade){ // 0=again 1=hard 2=good 3=easy
  const st = srsLoad();
  const s = st[card.id] || {interval:0, ease:2.5};
  if(grade === 0){ s.interval = 0; }
  else{
    s.ease = Math.max(1.3, s.ease + [0,-0.15,0,0.15][grade]);
    if(s.interval === 0) s.interval = grade === 1 ? 1 : (grade === 3 ? 4 : 2);
    else s.interval = Math.round(s.interval * (grade === 1 ? 1.2 : s.ease * (grade === 3 ? 1.3 : 1)));
    s.interval = Math.min(s.interval, 365);
  }
  const d = new Date(); d.setDate(d.getDate() + s.interval);
  s.due = d.toISOString().slice(0,10);
  st[card.id] = s; srsSave(st);
}
let clipPlayer = null;
function speak(text, audioDataUri){
  if(audioDataUri){
    if(clipPlayer) clipPlayer.pause();
    clipPlayer = new Audio(audioDataUri);
    clipPlayer.play();
    return;
  }
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US"; u.rate = 0.95;
  const v = speechSynthesis.getVoices().find(v => v.lang.startsWith("en"));
  if(v) u.voice = v;
  speechSynthesis.speak(u);
}
if("speechSynthesis" in window) speechSynthesis.getVoices();
function renderCards(){
  const all = DB.cards?.cards || [];
  if(!all.length){ view.appendChild(el("div","card",`<div class='empty'>${t("noCards")}</div>`)); return; }
  let queue = dueCards();
  const meta = el("div","fc-meta");
  const stage = el("div","fc-stage");
  const btns = el("div","fc-btns");
  btns.innerHTML = `<button class="b-again">${t("again")}</button><button class="b-hard">${t("hard")}</button>
    <button class="b-good">${t("good")}</button><button class="b-easy">${t("easy")}</button>`;
  view.appendChild(meta); view.appendChild(stage); view.appendChild(btns);

  let cardNode = null;
  function draw(){
    stage.innerHTML = ""; btns.style.visibility = queue.length ? "visible" : "hidden";
    meta.textContent = `${t("left")} ${queue.length} ${t("of")} ${all.length} ${t("cardsUnit")}`;
    if(!queue.length){
      stage.appendChild(el("div","fc-done",t("doneToday")));
      return;
    }
    const c = queue[0];
    cardNode = el("div","fc-card");
    cardNode.innerHTML = `
      <div class="fc-face">
        <span class="fc-tag">${esc((c.tags||[]).join(" · "))} · ${esc(c.date||"")}</span>
        <button class="fc-speak" aria-label="speak">${c.audio ? "🎧" : "🔊"}</button>
        <div class="fc-front-text">${esc(c.front)}</div>
        <span class="fc-hint">${c.audio ? t("realVoice") : ""}${t("tapReveal")}</span>
      </div>
      <div class="fc-face back">
        <button class="fc-speak" aria-label="speak">${c.audio ? "🎧" : "🔊"}</button>
        <div class="fc-back-text">${esc(pick(c, "back"))}</div>
      </div>`;
    cardNode.onclick = e => { if(e.target.closest(".fc-speak")) return; cardNode.classList.toggle("flip"); };
    cardNode.querySelectorAll(".fc-speak").forEach(b => b.onclick = () => speak(c.front, c.audio));
    stage.appendChild(cardNode);
  }
  btns.querySelectorAll("button").forEach((b, grade) => b.onclick = () => {
    const c = queue.shift();
    rate(c, grade);
    if(grade === 0) queue.push(c);
    draw();
  });
  draw();
}

/* ============ 統計 ============ */
function renderStats(){
  const ls = lessons();
  if(!ls.length){ view.appendChild(el("div","card",`<div class='empty'>${t("noData")}</div>`)); return; }
  const labels = ls.map(l => shortDate(l.date));
  const C1 = css("--c1"), C6 = css("--c6"), C3 = css("--c3"), C2 = css("--c2");

  const totalCards = (DB.cards?.cards || []).length;
  const totalMistakes = ls.reduce((s,l) => s + (l.mistakes||[]).length, 0);
  const tiles = el("div","tiles");
  tiles.appendChild(tile("LESSONS", ls.length, t("uLessons")));
  tiles.appendChild(tile("CARDS", totalCards, t("uCards")));
  tiles.appendChild(tile("MISTAKES", totalMistakes, t("uMistakes")));
  view.appendChild(tiles);

  const add = (title, seriesArr, unit) => {
    const c = el("div","card",`<h2>${title}</h2>`);
    const cw = el("div","chart");
    cw.appendChild(lineChart(labels, seriesArr, unit));
    c.appendChild(cw);
    if(seriesArr.length > 1) c.appendChild(legendFor(seriesArr.map(s => s.name), seriesArr.map(s => s.color)));
    view.appendChild(c);
  };
  add(t("chMistakes"), [{name:t("sMistake"), color:C6, values:ls.map(l => (l.mistakes||[]).length)}], "");
  if(ls.some(l => l.metrics?.wpm))
    add(t("chWpm"), [{name:t("sWpm"), color:C1, values:ls.map(l => l.metrics?.wpm ?? null)}], "");
  if(ls.some(l => l.metrics?.fillers != null))
    add(t("chFillers"), [{name:t("sFillers"), color:C3, values:ls.map(l => l.metrics?.fillers ?? null)}], "");
  const cum = []; let acc = 0;
  ls.forEach(l => { acc += (l.expressions||[]).length; cum.push(acc); });
  add(t("chExps"), [{name:t("sExps"), color:C2, values:cum}], "");

  const flagCnt = {};
  ls.forEach(l => (l.pronunciationFlags || []).forEach(f => flagCnt[f] = (flagCnt[f]||0) + 1));
  const flags = Object.entries(flagCnt).sort((a,b) => b[1] - a[1]);
  if(flags.length){
    const c = el("div","card",`<h2>${t("pronList")}</h2>`);
    const wrap = el("div","");
    flags.forEach(([f,n]) => {
      const b = el("button","ghostbtn",`🔊 ${esc(f)}${n > 1 ? ` <b style="color:var(--bad)">×${n}</b>` : ""}`);
      b.style.margin = "4px";
      b.onclick = () => speak(f);
      wrap.appendChild(b);
    });
    c.appendChild(wrap);
    c.appendChild(el("div","", `<div style="font-size:16px;color:var(--muted);margin-top:10px">${t("pronDesc")}</div>`));
    view.appendChild(c);
  }
}
</script>
